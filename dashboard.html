<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GitHub Issues Tracker</title>

    <link rel="icon" type="image/png" href="./Assets/github.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-gray-50 min-h-screen pb-10">

    <nav
        class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-2">
            <i class="fa-brands fa-github text-3xl"></i>
            <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
        </div>
        <div class="flex items-center gap-3 w-full md:w-auto">
            <div class="relative w-full md:w-80">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Search issues..."
                    class="input input-bordered w-full pl-10 focus:ring-2 focus:ring-indigo-500">
            </div>
            <button onclick="handleSearch()" class="btn bg-[#5800FF] hover:bg-indigo-700 text-white border-none">+ New
                Issue</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-8 px-4">

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex gap-2">
            <button onclick="filterIssues('all')" id="tab-all"
                class="tab-btn btn btn-sm bg-[#5800FF] text-white border-none">All</button>
            <button onclick="filterIssues('open')" id="tab-open"
                class="tab-btn btn btn-sm btn-ghost border border-gray-200">Open</button>
            <button onclick="filterIssues('closed')" id="tab-closed"
                class="tab-btn btn btn-sm btn-ghost border border-gray-200">Closed</button>
        </div>

        <div class="bg-white p-6 rounded-t-xl border border-gray-200 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-100 p-3 rounded-full">
                    <img src="./Assets/caution.png" class="w-8" alt="Alert icon">
                </div>
                <div>
                    <h2 class="text-xl font-bold text-gray-800"><span id="issueCount">0</span> Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm font-medium">
                <span class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-green-500"></div> Open
                </span>
                <span class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-purple-500"></div> Closed
                </span>
            </div>
        </div>

        <div id="loadingSpinner" class="flex justify-center p-20 hidden">
            <span class="loading loading-spinner loading-lg text-indigo-500"></span>
        </div>

        <div id="issuesContainer"
            class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 bg-white p-6 border-x border-b border-gray-200 rounded-b-xl">
        </div>
    </main>

    <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl p-0 overflow-hidden">
            <div id="modalContent">
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="dashboard.js"></script>
</body>

</html>
