<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white px-8 py-3 rounded-xl shadow-lg w-full max-w-md border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <i class="fa-brands fa-github text-6xl text-slate-800"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <input type="text" id="username" placeholder="Enter Username" 
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm" required>
                <p class="text-[10px] text-indigo-600 mt-1">Default: admin</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Enter Password" 
                    class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition shadow-sm" required>
                <p class="text-[10px] text-indigo-600 mt-1">Default: admin123</p>
            </div>

            <button type="submit" 
                class="w-full bg-[#5800FF] hover:bg-[#4a00d6] text-white font-bold py-3 rounded-lg transition-colors duration-200 shadow-md">
                Sign In
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-xs uppercase">
                <span class="bg-white px-2 text-gray-400">OR</span>
            </div>
        </div>

        <div class="text-center">
            <p class="text-xs text-gray-400 mb-2">Demo Credentials:</p>
            <div class="">
                <p class="text-sm text-gray-700"><strong>Username:</strong> admin</p>
                <p class="text-sm text-gray-700"><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin123') {
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid Credentials! Please use the demo info provided.');
            }
        });
    </script>

</body>
</html>
